<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plate Reader — Live Feed</title>
  <style>
    :root { --bg:#0f1117; --card:#1a1d28; --accent:#4f8cff; --text:#e6e8ee; --muted:#8b90a0; --good:#38d39f; --bad:#e05a5a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
           display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:0 16px 24px; }
    .nav { position:sticky; top:0; z-index:5; display:flex; gap:6px; width:100%; max-width:820px; padding:12px 0; background:var(--bg); }
    .nav a { flex:1; text-align:center; padding:9px 4px; border-radius:10px; text-decoration:none;
             background:#2a2e3c; color:var(--text); font-weight:600; font-size:.82rem; }
    .nav a.active { background:var(--accent); color:#fff; }
    .bar { display:flex; align-items:center; gap:12px; width:100%; max-width:820px; margin-bottom:10px; }
    .live { display:flex; align-items:center; gap:8px; font-weight:600; }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--good); box-shadow:0 0 6px var(--good); animation:pulse 1.2s infinite; }
    @keyframes pulse { 50%{opacity:.35} }
    .count { color:var(--muted); font-size:.85rem; margin-left:auto; }
    .card { background:var(--card); border-radius:14px; padding:8px; width:100%; max-width:820px; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:1rem; }
    th, td { text-align:left; padding:12px 10px; border-bottom:1px solid #2a2e3c; white-space:nowrap; }
    th { color:var(--muted); font-weight:600; font-size:.8rem; }
    td.plate { font-weight:800; letter-spacing:.5px; font-size:1.15rem; }
    .reconciled { font-size:.8rem; font-weight:700; color:var(--good); letter-spacing:.5px; }
    .yes { color:var(--good); font-weight:600; } .no { color:var(--muted); }
    .empty { text-align:center; padding:40px; color:var(--muted); }
    @keyframes flash { from { background:rgba(56,211,159,.25); } to { background:transparent; } }
    tr.new { animation:flash 2s ease-out; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/">📷 Scan</a>
    <a href="/lookup.html" class="active">🔎 Live feed</a>
    <a href="/daily.html">📅 Daily</a>
    <a href="/manage.html">⚙️ Manage</a>
  </nav>

  <div class="bar">
    <span class="live"><span class="dot"></span> Live</span>
    <span class="count" id="count"></span>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>Time</th><th>Plate</th><th>Owner</th><th>ID</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty">Waiting for scans… start the camera on the <a href="/" style="color:var(--accent)">Scan</a> page.</div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let seen = new Set();
    let maxTs = 0;
    let total = 0;

    const nostrip = (s) => (s || "").replace(/\s/g, "").toUpperCase();
    function rowHtml(c, isNew) {
      const t = new Date(c.ts).toLocaleTimeString();
      const o = c.owner;
      const owner = o && o.name ? `<span class="yes">${o.name}</span>` : `<span class="no">— unmatched</span>`;
      const idc = o && o.idcode ? o.idcode : "";
      const actual = o && o.actual && nostrip(o.actual) !== nostrip(c.plate)
        ? `<div class="reconciled">→ ${o.actual}</div>` : "";
      return `<tr class="${isNew ? "new" : ""}"><td>${t}</td><td class="plate">${c.plate}${actual}</td><td>${owner}</td><td class="no">${idc}</td></tr>`;
    }

    async function poll() {
      try {
        const url = maxTs ? "/api/captures?since=" + maxTs : "/api/captures?limit=50";
        const list = await (await fetch(url)).json();
        const fresh = list.filter((c) => !seen.has(c.id));
        if (fresh.length) {
          // newest first from API; prepend so newest stays on top
          const rows = $("rows");
          for (const c of fresh.slice().reverse()) {
            seen.add(c.id); total++;
            if (c.ts > maxTs) maxTs = c.ts;
            rows.insertAdjacentHTML("afterbegin", rowHtml(c, maxTs && true));
          }
          $("empty").style.display = "none";
          $("count").textContent = total + " scan" + (total === 1 ? "" : "s");
        }
      } catch {}
    }

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
