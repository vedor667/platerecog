<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Plate Reader — Capture</title>
  <style>
    :root { --bg:#0f1117; --card:#1a1d28; --accent:#4f8cff; --text:#e6e8ee; --muted:#8b90a0; --good:#38d39f; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
           display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:0 16px 24px; }
    .nav { position:sticky; top:0; z-index:5; display:flex; gap:8px; width:100%; max-width:480px;
           padding:12px 0; background:var(--bg); }
    .nav a { flex:1; text-align:center; padding:10px; border-radius:10px; text-decoration:none;
             background:#2a2e3c; color:var(--text); font-weight:600; font-size:.9rem; }
    .nav a.active { background:var(--accent); color:#fff; }
    h1 { font-size:1.1rem; margin:4px 0 12px; }
    .card { background:var(--card); border-radius:14px; padding:14px; width:100%; max-width:480px; margin-bottom:14px; }
    .viewport { position:relative; line-height:0; }
    video, canvas, img#preview { width:100%; border-radius:10px; background:#000; display:block; }
    canvas { display:none; }
    .bbox { position:absolute; border:3px solid var(--good); border-radius:4px; display:none;
            box-shadow:0 0 0 2px rgba(0,0,0,.4); pointer-events:none; }
    .bbox::after { content:attr(data-label); position:absolute; top:-22px; left:-3px;
            background:var(--good); color:#04201a; font:600 11px/1 system-ui, sans-serif;
            padding:3px 6px; border-radius:4px; white-space:nowrap; }
    .row { display:flex; gap:10px; margin-top:12px; }
    button { flex:1; padding:14px; border:none; border-radius:10px; font-size:1rem; font-weight:600;
             background:var(--accent); color:#fff; cursor:pointer; }
    button.secondary { background:#2a2e3c; color:var(--text); }
    button:disabled { opacity:.5; }
    label.lbl { display:block; font-size:.8rem; color:var(--muted); margin:4px 0; }
    input.plateInput { width:100%; padding:12px; font-size:1.6rem; font-weight:700; letter-spacing:1px;
             text-align:center; border-radius:10px; border:2px solid #2a2e3c; background:#0f1117;
             color:var(--text); text-transform:uppercase; }
    .province { color:var(--accent); font-size:1.1rem; margin-top:6px; text-align:center; }
    .muted { color:var(--muted); font-size:.85rem; }
    .owner { margin-top:10px; padding:10px; border-radius:10px; background:#0f1117; font-size:.95rem; }
    .owner.match { border-left:3px solid var(--good); }
    .owner.nomatch { border-left:3px solid #e0a13a; color:var(--muted); }
    .raw { font-family:monospace; font-size:.78rem; color:var(--muted); white-space:pre-wrap; margin-top:10px; }
    .spinner { border:3px solid #2a2e3c; border-top-color:var(--accent); border-radius:50%;
               width:24px; height:24px; animation:spin 1s linear infinite; margin:8px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .recent { font-size:.85rem; }
    .recent .item { display:flex; justify-content:space-between; padding:6px 0; border-top:1px solid #2a2e3c; }
    .recent .item b { letter-spacing:.5px; }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--good);
             color:#04201a; font-weight:700; padding:12px 18px; border-radius:10px; opacity:0;
             transition:opacity .2s; pointer-events:none; z-index:20; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="active">📸 Capture</a>
    <a href="/log.html">📋 Log</a>
    <a href="/manage.html">⚙️ Manage</a>
  </nav>

  <h1>🚗 Capture a plate</h1>

  <div class="card">
    <div class="viewport">
      <video id="video" autoplay playsinline muted></video>
      <img id="preview" style="display:none" />
      <div class="bbox" id="bbox"></div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="row">
      <button id="capture">📸 Capture &amp; Read</button>
    </div>
    <div class="row">
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" />
      <button id="uploadBtn" class="secondary">🖼️ Pick a photo</button>
    </div>
  </div>

  <div class="card result" id="resultCard" style="display:none">
    <div id="loading" style="display:none"><div class="spinner"></div><p class="muted" style="text-align:center">Reading…</p></div>
    <div id="output" style="display:none">
      <label class="lbl" for="plateInput">Plate (edit if misread)</label>
      <input id="plateInput" class="plateInput" autocomplete="off" />
      <div class="province" id="province"></div>
      <div class="muted" id="conf" style="text-align:center"></div>
      <div class="owner" id="owner"></div>
      <div class="raw" id="raw"></div>
      <div class="row">
        <button id="saveBtn">✓ Save to log</button>
        <button id="retakeBtn" class="secondary">↺ Retake</button>
      </div>
    </div>
  </div>

  <div class="card recent" id="recentCard" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center">
      <b>Recent captures</b><a href="/log.html" style="color:var(--accent); font-size:.85rem">View all →</a>
    </div>
    <div id="recentList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const video = $("video"), canvas = $("canvas"), preview = $("preview");
    const captureBtn = $("capture"), retakeBtn = $("retakeBtn"), uploadBtn = $("uploadBtn"), fileInput = $("fileInput");
    const resultCard = $("resultCard"), loading = $("loading"), output = $("output"), bbox = $("bbox");
    const plateInput = $("plateInput"), saveBtn = $("saveBtn"), ownerEl = $("owner");

    let stream = null, lastDetection = null, lastProvince = null, lastConfidence = 0;
    let registry = [];

    const norm = (p) => (p || "").toUpperCase().replace(/\s+/g, "").trim();

    async function loadRegistry() {
      try { registry = await (await fetch("/api/registry")).json(); } catch { registry = []; }
    }
    function findOwner(plate) {
      const np = norm(plate);
      return registry.find((r) => norm(r.plate) === np) || null;
    }
    function showOwner(plate) {
      const o = findOwner(plate);
      if (o) {
        ownerEl.className = "owner match";
        ownerEl.innerHTML = `<b>${o.name || "(no name)"}</b>` +
          (o.idcode ? ` &middot; ID ${o.idcode}` : "") + (o.note ? `<br><span class="muted">${o.note}</span>` : "");
      } else {
        ownerEl.className = "owner nomatch";
        ownerEl.innerHTML = "No owner match — add it on the <a href='/manage.html' style='color:var(--accent)'>Manage</a> page.";
      }
    }

    function toast(msg) {
      const t = $("toast"); t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1600);
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } }, audio: false });
        video.srcObject = stream; video.style.display = "block"; preview.style.display = "none";
      } catch (e) { video.style.display = "none"; }
    }

    function frameToBlob() {
      return new Promise((resolve) => {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        preview.src = canvas.toDataURL("image/jpeg", 0.9);
        canvas.toBlob((b) => resolve(b), "image/jpeg", 0.9);
      });
    }

    function drawBox() {
      if (!lastDetection || preview.style.display === "none" || !preview.naturalWidth) { bbox.style.display = "none"; return; }
      const [x1, y1, x2, y2] = lastDetection.box;
      const sx = preview.clientWidth / preview.naturalWidth, sy = preview.clientHeight / preview.naturalHeight;
      bbox.style.left = (x1*sx)+"px"; bbox.style.top = (y1*sy)+"px";
      bbox.style.width = ((x2-x1)*sx)+"px"; bbox.style.height = ((y2-y1)*sy)+"px";
      bbox.setAttribute("data-label", lastDetection.label); bbox.style.display = "block";
    }
    window.addEventListener("resize", drawBox);
    preview.addEventListener("load", drawBox);

    async function send(blob) {
      resultCard.style.display = "block"; loading.style.display = "block"; output.style.display = "none";
      bbox.style.display = "none"; lastDetection = null;
      const fd = new FormData(); fd.append("file", blob, "frame.jpg");
      try {
        const res = await fetch("/recognize", { method: "POST", body: fd });
        if (!res.ok) throw new Error("HTTP " + res.status);
        showResult(await res.json());
      } catch (e) {
        loading.style.display = "none"; output.style.display = "block";
        plateInput.value = ""; $("province").textContent = "";
        $("conf").textContent = e.message + " — is the backend running?";
        ownerEl.className = "owner nomatch"; ownerEl.textContent = "";
        $("raw").textContent = "";
      }
    }

    function showResult(data) {
      loading.style.display = "none"; output.style.display = "block";
      plateInput.value = (data.plate || "").toUpperCase();
      lastProvince = data.province || null;
      lastConfidence = data.confidence || 0;
      $("province").textContent = data.province ? "Province: " + data.province : "";
      $("conf").textContent = "confidence ~ " + Math.round((data.confidence || 0) * 100) + "%";
      $("raw").textContent = (data.raw || []).map(r => `${r.text}  (${Math.round(r.confidence*100)}%)`).join("\n");
      showOwner(plateInput.value);
      const det = data.detection;
      if (det && det.used && det.box) {
        lastDetection = { box: det.box, label: "plate " + Math.round((det.box_confidence || 0) * 100) + "%" };
        drawBox();
      } else { lastDetection = null; bbox.style.display = "none"; }
      plateInput.focus();
    }

    function resumeCamera() {
      bbox.style.display = "none"; lastDetection = null;
      preview.style.display = "none"; resultCard.style.display = "none";
      if (stream) video.style.display = "block";
    }

    plateInput.addEventListener("input", () => showOwner(plateInput.value));

    captureBtn.addEventListener("click", async () => {
      if (!stream) { fileInput.click(); return; }
      const blob = await frameToBlob();
      video.style.display = "none"; preview.style.display = "block";
      send(blob);
    });

    retakeBtn.addEventListener("click", resumeCamera);

    saveBtn.addEventListener("click", async () => {
      const plate = norm(plateInput.value);
      if (!plate) { toast("Enter a plate first"); return; }
      saveBtn.disabled = true;
      try {
        const res = await fetch("/api/captures", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ plate, province: lastProvince, confidence: lastConfidence }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        toast("Saved " + plate);
        resumeCamera();
        loadRecent();
      } catch (e) { toast("Save failed"); }
      finally { saveBtn.disabled = false; }
    });

    uploadBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      const f = e.target.files[0]; if (!f) return;
      preview.src = URL.createObjectURL(f); preview.style.display = "block"; video.style.display = "none";
      send(f);
    });

    async function loadRecent() {
      try {
        const list = await (await fetch("/api/captures")).json();
        const recent = list.slice(0, 5);
        $("recentCard").style.display = recent.length ? "block" : "none";
        $("recentList").innerHTML = recent.map((c) => {
          const t = new Date(c.ts).toLocaleString();
          const who = c.owner && c.owner.name ? c.owner.name : "<span class='muted'>—</span>";
          return `<div class="item"><b>${c.plate}</b><span>${who}</span><span class="muted">${t}</span></div>`;
        }).join("");
      } catch {}
    }

    (async () => { await loadRegistry(); await loadRecent(); startCamera(); })();
  </script>
</body>
</html>
