<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Plate Reader — Scan</title>
  <style>
    :root { --bg:#0f1117; --card:#1a1d28; --accent:#4f8cff; --text:#e6e8ee; --muted:#8b90a0; --good:#38d39f; --bad:#e05a5a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
           display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:0 16px 24px; }
    .nav { position:sticky; top:0; z-index:5; display:flex; gap:6px; width:100%; max-width:480px; padding:12px 0; background:var(--bg); }
    .nav a { flex:1; text-align:center; padding:9px 4px; border-radius:10px; text-decoration:none;
             background:#2a2e3c; color:var(--text); font-weight:600; font-size:.82rem; }
    .nav a.active { background:var(--accent); color:#fff; }
    .card { background:var(--card); border-radius:14px; padding:14px; width:100%; max-width:480px; margin-bottom:14px; }
    .viewport { position:relative; line-height:0; }
    video { width:100%; border-radius:10px; background:#000; display:block; }
    .scanline { position:absolute; left:0; right:0; height:2px; background:var(--good); box-shadow:0 0 8px var(--good);
                top:0; display:none; animation:scan 2s linear infinite; }
    @keyframes scan { 0%{top:4%} 50%{top:96%} 100%{top:4%} }
    .bbox { position:absolute; border:3px solid var(--good); border-radius:4px; display:none; pointer-events:none; }
    .row { display:flex; gap:10px; margin-top:12px; align-items:center; }
    button { flex:1; padding:14px; border:none; border-radius:10px; font-size:1rem; font-weight:700; background:var(--accent); color:#fff; cursor:pointer; }
    button.stop { background:var(--bad); }
    button.secondary { background:#2a2e3c; color:var(--text); font-weight:600; }
    select { padding:10px; border-radius:10px; border:2px solid #2a2e3c; background:#0f1117; color:var(--text); font-size:16px; }
    .row { flex-wrap:wrap; }
    .statusbar { display:flex; justify-content:space-between; align-items:center; font-size:.85rem; margin-top:10px; color:var(--muted); }
    .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#555; margin-right:6px; }
    .dot.on { background:var(--good); box-shadow:0 0 6px var(--good); animation:pulse 1.2s infinite; }
    @keyframes pulse { 50%{opacity:.4} }
    .bigplate { font-size:2.2rem; font-weight:800; letter-spacing:1px; text-align:center; word-break:break-word; }
    .bigplate.empty { color:var(--muted); font-size:1.1rem; font-weight:500; }
    .owner { margin-top:8px; padding:10px; border-radius:10px; background:#0f1117; text-align:center; }
    .owner.match { border-left:3px solid var(--good); }
    .owner.nomatch { border-left:3px solid #e0a13a; color:var(--muted); }
    .meta { text-align:center; color:var(--muted); font-size:.8rem; margin-top:6px; }
    .toggle { display:flex; align-items:center; gap:6px; font-size:.8rem; color:var(--muted); }
    .session { font-size:.85rem; }
    .session .item { display:flex; justify-content:space-between; gap:8px; padding:6px 0; border-top:1px solid #2a2e3c; }
    .session .item b { letter-spacing:.5px; }
    .label { font-size:.75rem; color:var(--muted); }
    @media (max-width: 520px) {
      .nav { gap:5px; }
      .nav a { font-size:.74rem; padding:9px 2px; }
      h1 { font-size:1rem; }
      .bigplate { font-size:1.9rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="active">📷 Scan</a>
    <a href="/lookup.html">🔎 Live feed</a>
    <a href="/daily.html">📅 Daily</a>
    <a href="/manage.html">⚙️ Manage</a>
  </nav>

  <div class="card">
    <div class="viewport">
      <video id="video" autoplay playsinline muted></video>
      <div class="scanline" id="scanline"></div>
      <div class="bbox" id="bbox"></div>
    </div>
    <div class="row">
      <button id="toggle">▶ Start scanning</button>
    </div>
    <div class="row">
      <span class="label">Every</span>
      <select id="interval">
        <option value="1000">1s</option>
        <option value="2000" selected>2s</option>
        <option value="4000">4s</option>
        <option value="8000">8s</option>
      </select>
      <label class="toggle"><input type="checkbox" id="skipStatic" checked /> skip still frames (saves API cost)</label>
    </div>
    <div class="statusbar">
      <span><span class="dot" id="dot"></span><span id="state">idle</span></span>
      <span>API calls: <b id="calls">0</b> · logged: <b id="logged">0</b></span>
    </div>
  </div>

  <div class="card">
    <div class="bigplate empty" id="plate">— waiting —</div>
    <div class="owner nomatch" id="owner" style="display:none"></div>
    <div class="meta" id="meta"></div>
  </div>

  <div class="card session">
    <div style="display:flex; justify-content:space-between; align-items:center">
      <b>This session</b><a href="/lookup.html" style="color:var(--accent); font-size:.85rem">Live lookup →</a>
    </div>
    <div id="sessionList"><div class="meta" style="text-align:left">Nothing logged yet.</div></div>
  </div>

  <canvas id="canvas" style="display:none"></canvas>

  <script>
    const $ = (id) => document.getElementById(id);
    const video = $("video"), canvas = $("canvas"), bbox = $("bbox");
    const norm = (p) => (p || "").toUpperCase().replace(/\s+/g, "").trim();
    const last4 = (p) => (p || "").replace(/\D/g, "").slice(-4);

    let stream = null, scanning = false, timer = null;
    let intervalMs = 2000, skipStatic = true;
    let calls = 0, logged = 0;
    let registry = [];
    let prevGray = null;
    const DIFF_THRESH = 7;

    // small canvas for cheap motion/diff detection
    const dc = document.createElement("canvas"); dc.width = 48; dc.height = 36;
    const dctx = dc.getContext("2d", { willReadFrequently: true });

    async function loadRegistry() {
      try { registry = await (await fetch("/api/registry")).json(); } catch { registry = []; }
    }
    function findOwner(plate) {
      const nd = norm(plate), k = last4(plate);
      let e = registry.find((r) => norm(r.plate) === nd); if (e) return e;
      if (k) {
        e = registry.find((r) => last4(r.actual) === k); if (e) return e;
        e = registry.find((r) => last4(r.plate) === k); if (e) return e;
      }
      return null;
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } }, audio: false });
        video.srcObject = stream;
      } catch (e) {
        $("state").textContent = "no camera (HTTPS + permission needed)";
      }
    }

    function smallGray() {
      dctx.drawImage(video, 0, 0, 48, 36);
      const d = dctx.getImageData(0, 0, 48, 36).data;
      const g = new Uint8Array(48 * 36);
      for (let i = 0, j = 0; i < d.length; i += 4, j++) g[j] = d[i] * 0.3 + d[i + 1] * 0.59 + d[i + 2] * 0.11;
      return g;
    }
    function meanDiff(a, b) {
      if (!a || !b) return 999;
      let s = 0; for (let i = 0; i < a.length; i++) s += Math.abs(a[i] - b[i]);
      return s / a.length;
    }

    function frameBlob() {
      return new Promise((resolve) => {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        canvas.toBlob((b) => resolve(b), "image/jpeg", 0.85);
      });
    }

    function showRead(data, status) {
      const plate = (data && data.plate) ? data.plate.toUpperCase() : null;
      $("plate").textContent = plate || "— no plate —";
      $("plate").className = "bigplate" + (plate ? "" : " empty");
      const o = plate ? findOwner(plate) : null;
      const ownerEl = $("owner");
      if (plate && o) {
        ownerEl.style.display = "block"; ownerEl.className = "owner match";
        const act = o.actual && last4(o.actual) !== last4(plate) ? ` &middot; plate ${o.actual}` : "";
        ownerEl.innerHTML = `<b>${o.name || "(no name)"}</b>` + (o.idcode ? ` &middot; ID ${o.idcode}` : "") + act;
      } else if (plate) {
        ownerEl.style.display = "block"; ownerEl.className = "owner nomatch";
        ownerEl.textContent = "no owner match";
      } else { ownerEl.style.display = "none"; }
      $("meta").textContent = status || (data ? "confidence ~ " + Math.round((data.confidence || 0) * 100) + "%" : "");
    }

    function addSession(rec) {
      logged++; $("logged").textContent = logged;
      const list = $("sessionList");
      if (list.querySelector(".meta")) list.innerHTML = "";
      const o = rec.owner && rec.owner.name ? rec.owner.name : "—";
      const t = new Date(rec.ts).toLocaleTimeString();
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `<b>${rec.plate}</b><span>${o}</span><span class="muted" style="color:var(--muted)">${t}</span>`;
      list.prepend(div);
    }

    async function scanOnce() {
      calls++; $("calls").textContent = calls;
      const blob = await frameBlob();
      const fd = new FormData(); fd.append("file", blob, "frame.jpg");
      try {
        const data = await (await fetch("/recognize", { method: "POST", body: fd })).json();
        if (data && data.plate) {
          showRead(data);
          const res = await (await fetch("/api/captures", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ plate: data.plate, province: data.province, confidence: data.confidence }),
          })).json();
          if (res && !res.duplicate) addSession(res);
          else if (res && res.duplicate) $("meta").textContent += "  · already logged recently";
        } else {
          showRead(null, "scanning…");
        }
      } catch (e) {
        $("meta").textContent = "error: " + e.message;
      }
    }

    async function tick() {
      if (!scanning) return;
      if (video.videoWidth) {
        let send = true;
        if (skipStatic) {
          const g = smallGray(); const d = meanDiff(g, prevGray); prevGray = g;
          if (d < DIFF_THRESH) { send = false; $("state").textContent = "scanning (still)"; }
          else $("state").textContent = "scanning (motion)";
        }
        if (send) await scanOnce();
      }
      if (scanning) timer = setTimeout(tick, intervalMs);
    }

    function setScanning(on) {
      scanning = on;
      $("toggle").textContent = on ? "⏹ Stop scanning" : "▶ Start scanning";
      $("toggle").className = on ? "stop" : "";
      $("dot").className = "dot" + (on ? " on" : "");
      $("scanline").style.display = on ? "block" : "none";
      $("state").textContent = on ? "scanning…" : "idle";
      if (on) { prevGray = null; tick(); } else { clearTimeout(timer); }
    }

    $("toggle").addEventListener("click", () => setScanning(!scanning));
    $("interval").addEventListener("change", (e) => { intervalMs = Number(e.target.value); });
    $("skipStatic").addEventListener("change", (e) => { skipStatic = e.target.checked; });

    (async () => { await loadRegistry(); await startCamera(); })();
  </script>
</body>
</html>
