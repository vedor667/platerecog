<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plate Reader — Log</title>
  <style>
    :root { --bg:#0f1117; --card:#1a1d28; --accent:#4f8cff; --text:#e6e8ee; --muted:#8b90a0; --good:#38d39f; --bad:#e05a5a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
           display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:0 16px 24px; }
    .nav { position:sticky; top:0; z-index:5; display:flex; gap:8px; width:100%; max-width:760px; padding:12px 0; background:var(--bg); }
    .nav a { flex:1; text-align:center; padding:10px; border-radius:10px; text-decoration:none;
             background:#2a2e3c; color:var(--text); font-weight:600; font-size:.9rem; }
    .nav a.active { background:var(--accent); color:#fff; }
    .bar { display:flex; gap:10px; width:100%; max-width:760px; margin-bottom:12px; align-items:center; }
    .bar input { flex:1; padding:10px; border-radius:10px; border:2px solid #2a2e3c; background:#0f1117; color:var(--text); }
    .bar button { padding:10px 14px; border:none; border-radius:10px; font-weight:600; background:#2a2e3c; color:var(--text); cursor:pointer; }
    .card { background:var(--card); border-radius:14px; padding:8px; width:100%; max-width:760px; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:.9rem; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #2a2e3c; white-space:nowrap; }
    th { color:var(--muted); font-weight:600; font-size:.8rem; }
    td.plate { font-weight:700; letter-spacing:.5px; }
    .owner-yes { color:var(--good); }
    .owner-no { color:var(--muted); }
    .del { background:none; border:none; color:var(--bad); cursor:pointer; font-size:1rem; }
    .muted { color:var(--muted); }
    .empty { text-align:center; padding:30px; color:var(--muted); }
    .count { color:var(--muted); font-size:.85rem; margin-left:auto; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/">📸 Capture</a>
    <a href="/log.html" class="active">📋 Log</a>
    <a href="/manage.html">⚙️ Manage</a>
  </nav>

  <div class="bar">
    <input id="search" placeholder="Search plate or owner…" autocomplete="off" />
    <button id="refresh">↻ Refresh</button>
    <button id="clear">🗑 Clear all</button>
  </div>
  <div class="count" id="count" style="width:100%; max-width:760px; margin-bottom:6px"></div>

  <div class="card">
    <table>
      <thead>
        <tr><th>Time</th><th>Plate</th><th>Owner</th><th>ID</th><th>Province</th><th>Conf</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No captures yet. Go to <a href="/" style="color:var(--accent)">Capture</a>.</div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let all = [];

    function render() {
      const q = $("search").value.toLowerCase().trim();
      const list = all.filter((c) => {
        if (!q) return true;
        const owner = c.owner ? (c.owner.name + " " + c.owner.idcode) : "";
        return (c.plate + " " + owner).toLowerCase().includes(q);
      });
      $("count").textContent = list.length + " capture" + (list.length === 1 ? "" : "s");
      $("empty").style.display = list.length ? "none" : "block";
      $("rows").innerHTML = list.map((c) => {
        const t = new Date(c.ts).toLocaleString();
        const o = c.owner;
        const owner = o && o.name ? `<span class="owner-yes">${o.name}</span>` : `<span class="owner-no">— unmatched</span>`;
        const idc = o && o.idcode ? o.idcode : "";
        return `<tr>
          <td class="muted">${t}</td>
          <td class="plate">${c.plate}</td>
          <td>${owner}</td>
          <td class="muted">${idc}</td>
          <td class="muted">${c.province || ""}</td>
          <td class="muted">${Math.round((c.confidence||0)*100)}%</td>
          <td><button class="del" data-id="${c.id}" title="Delete">✕</button></td>
        </tr>`;
      }).join("");
      document.querySelectorAll(".del").forEach((b) => b.onclick = () => del(b.dataset.id));
    }

    async function load() {
      try { all = await (await fetch("/api/captures")).json(); } catch { all = []; }
      render();
    }
    async function del(id) {
      await fetch("/api/captures/" + id, { method: "DELETE" });
      load();
    }

    $("search").addEventListener("input", render);
    $("refresh").addEventListener("click", load);
    $("clear").addEventListener("click", async () => {
      if (!confirm("Delete ALL captures? This cannot be undone.")) return;
      await fetch("/api/captures/clear", { method: "POST" });
      load();
    });

    load();
  </script>
</body>
</html>
